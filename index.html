<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Animata Pro | Advanced Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* The Canvas Background Grid */
        .canvas-bg {
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Advanced Keyframe Library */
        @keyframes svga-draw { from { stroke-dashoffset: 1000; } to { stroke-dashoffset: 0; } }
        @keyframes svga-morph { 0%, 100% { border-radius: 50% 50% 50% 50%; transform: scale(1); } 50% { border-radius: 30% 70% 70% 30%; transform: scale(1.05); } }
        @keyframes svga-hue { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }
        @keyframes svga-flip { 0% { transform: perspective(400px) rotateY(0); } 100% { transform: perspective(400px) rotateY(360deg); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans">

    <div class="flex h-screen">
        <aside class="w-80 border-r border-slate-800 bg-slate-900/50 p-6 flex flex-col gap-8 overflow-y-auto">
            <header>
                <h1 class="text-2xl font-black text-teal-400 italic">SVG ANIMATA</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Advanced Creator Engine</p>
            </header>

            <section class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">SVG URL</label>
                    <input type="text" id="svgUrl" value="https://api.iconify.design/logos:figma.svg" 
                        class="w-full bg-slate-800 border border-slate-700 rounded p-2 text-xs mt-2 outline-none focus:border-teal-500">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Animation Effect</label>
                    <select id="animType" class="w-full bg-slate-800 border border-slate-700 rounded p-2 text-xs mt-2 outline-none">
                        <optgroup label="Classic">
                            <option value="pulse">Pulse</option>
                            <option value="spin">Spin</option>
                            <option value="float">Float</option>
                        </optgroup>
                        <optgroup label="Pro Effects">
                            <option value="morph">Liquid Morph</option>
                            <option value="hue">Color Shift</option>
                            <option value="flip">3D Flip</option>
                        </optgroup>
                    </select>
                </div>

                <div class="space-y-4 pt-4 border-t border-slate-800">
                    <div>
                        <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase">
                            <span>Duration</span>
                            <span id="durLabel">1.5s</span>
                        </div>
                        <input type="range" id="duration" min="0.1" max="5" step="0.1" value="1.5" class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-teal-500 mt-2">
                    </div>
                    
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 uppercase">Trigger</label>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <button onclick="setTrigger('loop')" id="loopBtn" class="bg-teal-600 text-[10px] font-bold py-2 rounded">LOOP</button>
                            <button onclick="setTrigger('hover')" id="hoverBtn" class="bg-slate-800 text-[10px] font-bold py-2 rounded">HOVER</button>
                        </div>
                    </div>
                </div>
            </section>
        </aside>

        <main class="flex-1 canvas-bg flex flex-col items-center justify-center p-12 relative">
            <div id="previewContainer" class="p-8 transition-all duration-300"></div>
            <div class="absolute bottom-8 bg-slate-900 border border-slate-800 px-4 py-2 rounded-full text-[10px] text-slate-400">
                Canvas Preview Mode: <span id="modeDisplay" class="text-teal-400">Looping</span>
            </div>
        </main>

        <aside class="w-96 border-l border-slate-800 bg-slate-900/50 p-6 flex flex-col">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Generated Snippet</span>
                <button onclick="copyCode()" class="text-[10px] bg-teal-600 px-3 py-1 rounded font-bold hover:bg-teal-500 transition">COPY</button>
            </div>
            <div class="flex-1 bg-black/50 border border-slate-800 rounded-lg p-4 font-mono text-[10px] text-teal-200 overflow-auto">
                <pre id="codeSnippet"></pre>
            </div>
        </aside>
    </div>

    <script>
        let trigger = 'loop';
        const selectors = ['svgUrl', 'animType', 'duration'];
        const els = {};
        selectors.forEach(id => els[id] = document.getElementById(id));

        function setTrigger(t) {
            trigger = t;
            document.getElementById('loopBtn').classList.toggle('bg-teal-600', t==='loop');
            document.getElementById('loopBtn').classList.toggle('bg-slate-800', t!=='loop');
            document.getElementById('hoverBtn').classList.toggle('bg-teal-600', t==='hover');
            document.getElementById('hoverBtn').classList.toggle('bg-slate-800', t!=='hover');
            document.getElementById('modeDisplay').innerText = t === 'loop' ? 'Looping' : 'On Hover';
            update();
        }

        function update() {
            const url = els.svgUrl.value;
            const anim = els.animType.value;
            const dur = els.duration.value;
            document.getElementById('durLabel').innerText = dur + 's';

            const keyframes = {
                pulse: '0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); }',
                spin: 'from { transform: rotate(0deg); } to { transform: rotate(360deg); }',
                float: '0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); }',
                morph: '0%, 100% { border-radius: 50%; transform: scale(1); } 50% { border-radius: 30% 70% 70% 30%; transform: scale(1.1); }',
                hue: 'from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); }',
                flip: '0% { transform: perspective(400px) rotateY(0); } 100% { transform: perspective(400px) rotateY(360deg); }'
            };

            const embed = `
<div class="svga-box" style="display:inline-block; transition: all 0.3s ease;">
  <img src="${url}" class="svga-el">
  <style>
    .svga-el { 
        width: 100px; height: 100px; 
        ${trigger === 'loop' ? `animation: svga-kf ${dur}s infinite ease-in-out;` : 'transition: all 0.3s ease;'}
    }
    ${trigger === 'hover' ? `.svga-box:hover .svga-el { animation: svga-kf ${dur}s infinite ease-in-out; }` : ''}
    @keyframes svga-kf { ${keyframes[anim]} }
  </style>
</div>`;

            document.getElementById('previewContainer').innerHTML = embed;
            document.getElementById('codeSnippet').innerText = embed;
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('codeSnippet').innerText);
            alert("Copied to clipboard!");
        }

        selectors.forEach(id => els[id].addEventListener('input', update));
        update();
    </script>
</body>
</html>
