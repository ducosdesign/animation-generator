<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Animata | Pro Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Base styles for the preview window */
        #previewContainer img { width: 120px; height: 120px; transition: all 0.3s ease; }
        
        /* Animation Definitions */
        .anim-pulse { animation: pulse 1s infinite ease-in-out; }
        .anim-spin { animation: spin 2s infinite linear; }
        .anim-shake { animation: shake 0.5s infinite ease-in-out; }
        .anim-float { animation: float 3s infinite ease-in-out; }
        .anim-bounce { animation: bounce 1s infinite; }
        .anim-glow { animation: glow 1.5s infinite alternate; }
        .anim-flash { animation: flash 1s infinite; }

        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-30px); } 60% { transform: translateY(-15px); } }
        @keyframes glow { from { filter: drop-shadow(0 0 2px #2dd4bf); } to { filter: drop-shadow(0 0 15px #2dd4bf); } }
        @keyframes flash { 0%, 50%, 100% { opacity: 1; } 25%, 75% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10 border-b border-zinc-800 pb-6">
            <h1 class="text-3xl font-bold text-teal-400">SVG Animata <span class="text-zinc-600 text-lg font-normal">v1.1</span></h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <aside class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 space-y-6">
                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">SVG Source URL</label>
                    <input type="text" id="svgUrl" value="https://api.iconify.design/logos:visual-studio-code.svg" class="w-full bg-zinc-800 p-3 rounded-lg text-sm outline-none border border-zinc-700 focus:border-teal-500">
                </div>

                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">Animation Style</label>
                    <select id="animType" class="w-full bg-zinc-800 p-3 rounded-lg text-sm outline-none border border-zinc-700">
                        <option value="pulse">Pulse</option>
                        <option value="spin">Spin</option>
                        <option value="shake">Shake</option>
                        <option value="float">Float</option>
                        <option value="bounce">Bounce</option>
                        <option value="glow">Neon Glow</option>
                        <option value="flash">Flash</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-zinc-500 uppercase mb-2">Trigger Type</label>
                    <div class="flex gap-2">
                        <button onclick="setTrigger('loop')" id="btnLoop" class="flex-1 py-2 rounded-lg bg-teal-600 font-bold text-xs">INFINITE</button>
                        <button onclick="setTrigger('hover')" id="btnHover" class="flex-1 py-2 rounded-lg bg-zinc-800 font-bold text-xs">ON HOVER</button>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-1 bg-zinc-900 rounded-2xl border border-zinc-800 flex flex-col items-center justify-center p-12 min-h-[400px]">
                <div id="previewContainer"></div>
                <p class="mt-8 text-zinc-500 text-xs italic" id="previewHint">Running infinitely...</p>
            </main>

            <aside class="bg-black p-6 rounded-2xl border border-zinc-800">
                <div class="flex justify-between mb-4">
                    <span class="text-xs font-bold text-teal-500 uppercase">Embed Snippet</span>
                    <button onclick="copyCode()" class="text-[10px] bg-zinc-800 px-3 py-1 rounded hover:bg-teal-600 transition">COPY</button>
                </div>
                <pre id="codeSnippet" class="text-[10px] text-zinc-400 whitespace-pre-wrap break-all font-mono"></pre>
            </aside>
        </div>
    </div>

    <script>
        let currentTrigger = 'loop';
        const urlInput = document.getElementById('svgUrl');
        const animSelect = document.getElementById('animType');
        const previewContainer = document.getElementById('previewContainer');
        const codeSnippet = document.getElementById('codeSnippet');
        const previewHint = document.getElementById('previewHint');

        function setTrigger(type) {
            currentTrigger = type;
            document.getElementById('btnLoop').className = type === 'loop' ? 'flex-1 py-2 rounded-lg bg-teal-600 font-bold text-xs' : 'flex-1 py-2 rounded-lg bg-zinc-800 font-bold text-xs';
            document.getElementById('btnHover').className = type === 'hover' ? 'flex-1 py-2 rounded-lg bg-teal-600 font-bold text-xs' : 'flex-1 py-2 rounded-lg bg-zinc-800 font-bold text-xs';
            previewHint.innerText = type === 'hover' ? 'Hover over the icon to see animation' : 'Running infinitely...';
            update();
        }

        function update() {
            const url = urlInput.value;
            const anim = animSelect.value;
            const animClass = `anim-${anim}`;

            // Update Preview
            previewContainer.innerHTML = `<img src="${url}" id="previewImg">`;
            const img = document.getElementById('previewImg');
            
            if (currentTrigger === 'loop') {
                img.classList.add(animClass);
            } else {
                img.addEventListener('mouseenter', () => img.classList.add(animClass));
                img.addEventListener('mouseleave', () => img.classList.remove(animClass));
            }

            // Generate Code with improved CSS Logic for Hover
            const keyframes = {
                pulse: '0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); }',
                spin: 'from { transform: rotate(0deg); } to { transform: rotate(360deg); }',
                shake: '0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); }',
                float: '0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); }',
                bounce: '0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-30px); } 60% { transform: translateY(-15px); }',
                glow: 'from { filter: drop-shadow(0 0 2px #2dd4bf); } to { filter: drop-shadow(0 0 15px #2dd4bf); }',
                flash: '0%, 50%, 100% { opacity: 1; } 25%, 75% { opacity: 0.3; }'
            };

            const embedCode = `
<div class="svga-box" style="display:inline-block;">
  <img src="${url}" class="svga-target">
  <style>
    .svga-target { 
        width: 100px; height: 100px; 
        transition: all 0.3s ease;
        ${currentTrigger === 'loop' ? `animation: svga-run 1.5s infinite ease-in-out;` : ''}
    }
    ${currentTrigger === 'hover' ? `.svga-box:hover .svga-target { animation: svga-run 1.5s infinite ease-in-out; }` : ''}
    @keyframes svga-run { ${keyframes[anim]} }
  </style>
</div>`;

            codeSnippet.innerText = embedCode;
        }

        function copyCode() {
            navigator.clipboard.writeText(codeSnippet.innerText);
            alert("Code copied!");
        }

        urlInput.addEventListener('input', update);
        animSelect.addEventListener('change', update);
        update();
    </script>
</body>
</html>
