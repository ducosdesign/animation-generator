<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Animata | Morph Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .canvas-grid { background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 30px 30px; }
        .bg-checker { background-image: conic-gradient(#e5e7eb 25%, #ffffff 0 50%, #e5e7eb 0 75%, #ffffff 0); background-size: 20px 20px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #14b8a6; border-radius: 10px; }
        
        /* Morph Logic */
        .morph-container { position: relative; width: 150px; height: 150px; }
        .morph-asset { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .asset-b { opacity: 0; transform: scale(0.5) rotate(-20deg); filter: blur(10px); }

        /* Triggering the Morph */
        .morph-active .asset-a { opacity: 0; transform: scale(1.5) rotate(20deg); filter: blur(10px); }
        .morph-active .asset-b { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0px); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans overflow-hidden">

    <div class="flex h-screen">
        <aside class="w-80 border-r border-slate-800 bg-slate-900 flex flex-col shadow-2xl z-10 overflow-y-auto">
            <div class="p-6 border-b border-slate-800">
                <h1 class="text-xl font-black text-teal-400 italic">SVG ANIMATA MORPH</h1>
            </div>

            <div class="p-6 space-y-6">
                <section>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Primary SVG (A)</label>
                    <input type="text" id="svgUrlA" value="https://lizducos.princegeorgedesign.com/wp-content/uploads/2026/02/dd3.svg" 
                        class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-[10px] mt-2 outline-none focus:border-teal-400">
                </section>

                <section>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Secondary SVG (B)</label>
                    <input type="text" id="svgUrlB" value="https://api.iconify.design/logos:figma.svg" 
                        class="w-full bg-slate-950 border border-teal-900/50 rounded-lg p-3 text-[10px] mt-2 outline-none focus:border-teal-400">
                </section>

                <section>
                    <label class="text-[10px] font-bold text-slate-500 uppercase">Base Animation (20 Styles)</label>
                    <select id="animType" class="w-full bg-slate-950 border border-slate-700 rounded-lg p-3 text-xs mt-2 outline-none">
                        <optgroup label="Standard (10)">
                            <option value="pulse">Pulse</option><option value="spin">Spin</option><option value="float">Float</option>
                            <option value="bounce">Bounce</option><option value="shake">Shake</option><option value="swing">Swing</option>
                            <option value="zoom">Soft Zoom</option><option value="slide">Slide In</option><option value="tada">Tada!</option><option value="jello">Jello</option>
                        </optgroup>
                        <optgroup label="Pro (10)">
                            <option value="morph">Liquid Morph</option><option value="flip">3D Flip</option><option value="glitch">Cyber Glitch</option>
                            <option value="glaze">Color Glaze</option><option value="neon">Neon Glow</option><option value="flash">Strobe Flash</option>
                            <option value="rubber">Rubber Band</option><option value="blur">Focus Fade</option><option value="skew">Skew Warp</option><option value="portal">Portal Spin</option>
                        </optgroup>
                    </select>
                </section>

                <section class="space-y-4 pt-4 border-t border-slate-800">
                    <div class="flex justify-between text-[10px] font-bold text-slate-500 uppercase">
                        <span>Speed</span>
                        <span id="durLabel" class="text-teal-400">1.2s</span>
                    </div>
                    <input type="range" id="duration" min="0.1" max="4" step="0.1" value="1.2" class="w-full h-1 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-teal-500">
                    
                    <div class="pt-4">
                        <button id="morphBtn" onclick="toggleMorph()" class="w-full py-3 bg-gradient-to-r from-teal-600 to-blue-600 rounded-lg font-bold text-xs shadow-lg hover:scale-105 transition-transform">
                            TEST MORPH TRANSITION
                        </button>
                    </div>
                </section>
            </div>
        </aside>

        <main class="flex-1 canvas-grid flex items-center justify-center relative bg-slate-950">
            <div id="previewContainer" class="p-16 rounded-full bg-slate-900/40 border border-slate-800 shadow-2xl">
                </div>
        </main>

        <aside class="w-96 border-l border-slate-800 bg-slate-900 p-6 flex flex-col">
            <h3 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Morph Embed Code</h3>
            <div class="flex-1 bg-black/50 border border-slate-800 rounded-xl p-4 font-mono text-[10px] text-teal-300 overflow-auto">
                <pre id="codeSnippet" class="whitespace-pre-wrap"></pre>
            </div>
            <button onclick="copyCode()" class="mt-4 w-full py-2 bg-slate-800 rounded font-bold text-xs hover:bg-teal-600 transition">COPY CODE</button>
        </aside>
    </div>

    <script>
        let isMorphed = false;
        const keyframes = {
            pulse: '0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); }',
            spin: 'from { transform: rotate(0deg); } to { transform: rotate(360deg); }',
            float: '0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); }',
            bounce: '0%, 20%, 50%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-30px); } 60% { transform: translateY(-15px); }',
            shake: '0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); }',
            swing: '20% { transform: rotate(15deg); } 40% { transform: rotate(-10deg); } 60% { transform: rotate(5deg); } 80% { transform: rotate(-5deg); } 100% { transform: rotate(0deg); }',
            zoom: '0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; }',
            slide: '0% { transform: translateX(-50px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; }',
            tada: '0% { transform: scale(1); } 10%, 20% { transform: scale(0.9) rotate(-3deg); } 30%, 50%, 70%, 90% { transform: scale(1.1) rotate(3deg); } 40%, 60%, 80% { transform: scale(1.1) rotate(-3deg); } 100% { transform: scale(1) rotate(0); }',
            jello: '11.1% { transform: none; } 22.2% { transform: skewX(-12.5deg) skewY(-12.5deg); } 33.3% { transform: skewX(6.25deg) skewY(6.25deg); } 44.4% { transform: skewX(-3.125deg) skewY(-3.125deg); } 55.5% { transform: skewX(1.5625deg) skewY(1.5625deg); } 100% { transform: none; }',
            morph: '0%, 100% { border-radius: 50%; } 50% { border-radius: 30% 70% 70% 30%; transform: scale(1.1); }',
            flip: 'from { transform: perspective(400px) rotateY(0); } to { transform: perspective(400px) rotateY(360deg); }',
            glitch: '0% { transform: translate(0); } 20% { transform: translate(-5px, 5px); } 40% { transform: translate(-5px, -5px); } 60% { transform: translate(5px, 5px); } 80% { transform: translate(5px, -5px); } 100% { transform: translate(0); }',
            glaze: 'from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); }',
            neon: 'from { filter: drop-shadow(0 0 2px #2dd4bf); } to { filter: drop-shadow(0 0 20px #2dd4bf); }',
            flash: '0%, 50%, 100% { opacity: 1; } 25%, 75% { opacity: 0.2; }',
            rubber: '0% { transform: scale3d(1, 1, 1); } 30% { transform: scale3d(1.25, 0.75, 1); } 40% { transform: scale3d(0.75, 1.25, 1); } 50% { transform: scale3d(1.15, 0.85, 1); } 100% { transform: scale3d(1, 1, 1); }',
            blur: '0%, 100% { filter: blur(0px); opacity: 1; } 50% { filter: blur(8px); opacity: 0.5; }',
            skew: '0%, 100% { transform: skew(0deg); } 50% { transform: skew(20deg, 10deg); }',
            portal: '0% { transform: scale(1) rotate(0); filter: brightness(1); } 50% { transform: scale(0.1) rotate(180deg); filter: brightness(2); } 100% { transform: scale(1) rotate(360deg); filter: brightness(1); }'
        };

        function toggleMorph() {
            isMorphed = !isMorphed;
            document.getElementById('previewContainer').classList.toggle('morph-active', isMorphed);
            update();
        }

        function update() {
            const urlA = document.getElementById('svgUrlA').value;
            const urlB = document.getElementById('svgUrlB').value;
            const anim = document.getElementById('animType').value;
            const dur = document.getElementById('duration').value;
            document.getElementById('durLabel').innerText = dur + 's';

            const embed = `
<div class="svga-morph-wrapper ${isMorphed ? 'morph-active' : ''}">
  <div class="svga-inner-anim">
    <img src="${urlA}" class="svga-asset asset-a">
    <img src="${urlB}" class="svga-asset asset-b">
  </div>
  <style>
    .svga-morph-wrapper { position: relative; width: 120px; height: 120px; cursor: pointer; }
    .svga-inner-anim { width: 100%; height: 100%; animation: kf-main ${dur}s infinite ease-in-out; }
    .svga-asset { position: absolute; inset: 0; width: 100%; height: 100%; transition: all 0.8s ease; }
    .asset-b { opacity: 0; transform: scale(0.5) rotate(-20deg); filter: blur(10px); }
    
    .morph-active .asset-a { opacity: 0; transform: scale(1.5) rotate(20deg); filter: blur(10px); }
    .morph-active .asset-b { opacity: 1; transform: scale(1) rotate(0deg); filter: blur(0px); }
    
    @keyframes kf-main { ${keyframes[anim]} }
  </style>
</div>`;

            document.getElementById('previewContainer').innerHTML = embed;
            document.getElementById('codeSnippet').innerText = embed.trim();
        }

        ['svgUrlA', 'svgUrlB', 'animType', 'duration'].forEach(id => document.getElementById(id).addEventListener('input', update));
        update();
    </script>
</body>
</html>
